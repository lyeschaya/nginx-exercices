apiVersion: v1
kind: ConfigMap
metadata:
  name: nginx-conf-2
  namespace: formation-openshift
data:
  default.conf: |
    server {
        listen 8080;
        location / {
            root /usr/share/nginx/html;
            index index.html;
        }
        location /config/ {
            alias /etc/nginx/configmap/;
            default_type text/plain;
        }
    }
 