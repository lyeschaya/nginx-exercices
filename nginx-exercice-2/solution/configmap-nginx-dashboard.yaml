apiVersion: v1
kind: ConfigMap
metadata:
  name: nginx-dashboard-2
  namespace: formation-openshift
data:
  index.html: |
    <!DOCTYPE html>
    <html lang="fr" data-theme="light">
    <head>
        <meta charset="UTF-8">
        <title>Neutron IT - Dashboard</title>
        <style>
            :root[data-theme="light"]{--bg:#f8fafc;--card:#fff;--border:#e2e8f0;--text:#0f172a;--muted:#64748b;--primary:#4f46e5;--primary-light:#eef2ff;--danger:#e11d48;--danger-light:#fff1f2;--success:#16a34a;--success-light:#f0fdf4;--warn:#d97706;--warn-light:#fffbeb}
            :root[data-theme="dark"]{--bg:#0f172a;--card:#1e293b;--border:#334155;--text:#f1f5f9;--muted:#94a3b8;--primary:#818cf8;--primary-light:#1e1b4b;--danger:#fb7185;--danger-light:#1f1019;--success:#4ade80;--success-light:#052e16;--warn:#fbbf24;--warn-light:#1c1407}
            *{margin:0;padding:0;box-sizing:border-box;transition:background-color .2s,color .2s,border-color .2s}
            body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
            .header{background:var(--card);padding:16px 40px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border)}
            .brand{font-size:1.1rem;font-weight:800;letter-spacing:-.025em}
            .hright{display:flex;align-items:center;gap:10px}
            .dot{width:8px;height:8px;border-radius:50%;background:var(--success);animation:pulse 2s infinite}
            @keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
            .pill{background:var(--success-light);color:var(--success);font-size:.7rem;font-weight:700;padding:4px 10px;border-radius:999px;border:1px solid var(--success)}
            .tbtn{background:var(--bg);border:1px solid var(--border);border-radius:999px;padding:5px 10px;cursor:pointer;font-size:.9rem;color:var(--text)}
            .container{max-width:640px;margin:40px auto;padding:0 20px 60px}
            h1{font-size:1.6rem;font-weight:700;margin-bottom:4px}
            .sub{font-size:.83rem;color:var(--muted);margin-bottom:28px}
            .card{background:var(--card);border-radius:16px;padding:22px 24px;margin-bottom:18px;border:1px solid var(--border)}
            .card-hd{display:flex;align-items:center;gap:10px;margin-bottom:16px}
            .badge{padding:3px 8px;border-radius:4px;color:#fff;font-size:.7rem;font-weight:700}
            .bg-cm{background:var(--primary)}.bg-s{background:var(--danger)}
            .ctitle{font-size:.75rem;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.04em}
            .item{display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid var(--border);gap:16px}
            .item:last-of-type{border-bottom:none}
            .key{font-family:Monaco,Menlo,monospace;font-size:.82rem;font-weight:600}
            .val{font-size:.88rem;font-weight:500;padding:4px 12px;border-radius:6px;max-width:300px;word-break:break-all;text-align:right}
            .val-cm{background:var(--primary-light);color:var(--primary)}
            .val-s{background:var(--danger-light);color:var(--danger)}
            .val-empty{background:var(--warn-light);color:var(--warn);font-style:italic}
            .flash{animation:flash .6s ease}
            @keyframes flash{0%{opacity:.1}100%{opacity:1}}
            .pw-row{display:flex;align-items:center;gap:8px}
            .eye-btn{
                background:var(--bg);
                border:1px solid var(--border);
                border-radius:8px;
                cursor:pointer;
                padding:5px 10px;
                color:var(--muted);
                font-size:.75rem;
                font-weight:600;
                display:flex;
                align-items:center;
                gap:5px;
                transition:all .15s;
            }
            .eye-btn:hover{background:var(--card);border-color:var(--danger);color:var(--danger)}
            .eye-btn svg{width:14px;height:14px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
            .footer{text-align:center;color:var(--muted);font-size:.72rem;margin-top:36px}
        </style>
    </head>
    <body>
    <header class="header">
        <div class="brand">NEUTRON IT</div>
        <div class="hright">
            <div class="dot"></div>
            <div class="pill">NGINX SERVED</div>
            <button class="tbtn" onclick="toggleTheme()" id="tbtn">🌙</button>
        </div>
    </header>
    <div class="container">
        <h1>Dashboard Configuration</h1>
        <p class="sub">ConfigMap &amp; Secret — exercice 2 OpenShift</p>
        <div class="card">
            <div class="card-hd">
                <span class="badge bg-cm">CM</span>
                <span class="ctitle">ConfigMap: nginx-config-2</span>
            </div>
            <div class="item">
                <span class="key">APP_MESSAGE</span>
                <span class="val val-cm" id="msg">chargement...</span>
            </div>
        </div>
        <div class="card">
            <div class="card-hd">
                <span class="badge bg-s">S</span>
                <span class="ctitle">Secret: nginx-secret-2</span>
            </div>
            <div class="item">
                <span class="key">USERNAME</span>
                <span class="val val-s" id="username">chargement...</span>
            </div>
            <div class="item">
                <span class="key">PASSWORD</span>
                <div class="pw-row">
                    <span class="val val-s" id="password">&#8226;&#8226;&#8226;&#8226;&#8226;&#8226;&#8226;&#8226;</span>
                    <button class="eye-btn" onclick="togglePw()" id="eye-btn">
                        <svg id="eye-icon" viewBox="0 0 24 24"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
                        <span id="eye-label">Afficher</span>
                    </button>
                </div>
            </div>
        </div>
        <footer class="footer">Neutron IT | OpenShift Lab 2026</footer>
    </div>
    <script>
        var realPw="",showPw=false,lastMsg="";
        var EMPTY_TEXT="— (non configuré)";
        function toggleTheme(){
            var h=document.documentElement;
            var d=h.getAttribute("data-theme")==="dark";
            h.setAttribute("data-theme",d?"light":"dark");
            document.getElementById("tbtn").textContent=d?"🌙":"☀️";
        }
        function setEmpty(el){
            el.textContent=EMPTY_TEXT;
            el.classList.remove("val-cm","val-s");
            el.classList.add("val-empty");
        }
        function setFilled(el,cls){
            el.classList.remove("val-empty");
            el.classList.add(cls);
        }
        function togglePw(){
            showPw=!showPw;
            var pwEl=document.getElementById("password");
            if(showPw){
                if(realPw){setFilled(pwEl,"val-s");pwEl.textContent=realPw;}
                else{setEmpty(pwEl);}
            } else {
                pwEl.textContent="\u2022\u2022\u2022\u2022\u2022\u2022\u2022\u2022";
                if(realPw){setFilled(pwEl,"val-s");}
            }
            document.getElementById("eye-label").textContent=showPw?"Masquer":"Afficher";
            var icon=document.getElementById("eye-icon");
            if(showPw){
                icon.innerHTML='<path d="M17.94 17.94A10.07 10.07 0 0112 20c-7 0-11-8-11-8a18.45 18.45 0 015.06-5.94M9.9 4.24A9.12 9.12 0 0112 4c7 0 11 8 11 8a18.5 18.5 0 01-2.16 3.19m-6.72-1.07a3 3 0 11-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/>';
            } else {
                icon.innerHTML='<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>';
            }
        }
        function fetchMsg(){
            fetch("/config/APP_MESSAGE?t="+Date.now())
                .then(function(r){if(!r.ok)throw new Error(r.status);return r.text();})
                .then(function(v){
                    v=v.trim();
                    var el=document.getElementById("msg");
                    if(!v){setEmpty(el);lastMsg="";return;}
                    if(v!==lastMsg){
                        setFilled(el,"val-cm");
                        el.textContent=v;
                        el.classList.remove("flash");void el.offsetWidth;el.classList.add("flash");
                        lastMsg=v;
                    }
                })
                .catch(function(){setEmpty(document.getElementById("msg"));lastMsg="";});
        }
        function fetchUsername(){
            fetch("/config/USERNAME?t="+Date.now())
                .then(function(r){if(!r.ok)throw new Error(r.status);return r.text();})
                .then(function(v){
                    v=v.trim();
                    var el=document.getElementById("username");
                    if(!v){setEmpty(el);return;}
                    setFilled(el,"val-s");
                    el.textContent=v;
                })
                .catch(function(){setEmpty(document.getElementById("username"));});
        }
        function fetchPassword(){
            fetch("/config/PASSWORD?t="+Date.now())
                .then(function(r){if(!r.ok)throw new Error(r.status);return r.text();})
                .then(function(v){
                    realPw=v.trim();
                    var el=document.getElementById("password");
                    if(showPw){
                        if(realPw){setFilled(el,"val-s");el.textContent=realPw;}
                        else{setEmpty(el);}
                    }
                })
                .catch(function(){
                    realPw="";
                    if(showPw){setEmpty(document.getElementById("password"));}
                });
        }
        fetchMsg();fetchUsername();fetchPassword();
        setInterval(fetchMsg,15000);
        setInterval(fetchUsername,15000);
        setInterval(fetchPassword,15000);
    </script>
    </body>
    </html>