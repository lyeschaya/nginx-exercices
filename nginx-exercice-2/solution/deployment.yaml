apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginx-unprivileged-2
  labels:
    app: nginx-unprivileged-2
spec:
  replicas: 3
  selector:
    matchLabels:
      app: nginx-unprivileged-2
  template:
    metadata:
      labels:
        app: nginx-unprivileged-2
        deployment: nginx-unprivileged-2
    spec:
      serviceAccountName: nginx-dashboard-sa

      initContainers:
        - name: envsubst
          image: registry.access.redhat.com/ubi9/ubi-minimal:latest
          command:
            - /bin/sh
            - -c
            - |
              SA_TOKEN=$(cat /var/run/secrets/kubernetes.io/serviceaccount/token)
              sed \
                -e "s|\${APP_MESSAGE}|${APP_MESSAGE}|g" \
                -e "s|\${USERNAME}|${USERNAME}|g" \
                -e "s|\${OPENSHIFT_API_URL}|${OPENSHIFT_API_URL}|g" \
                -e "s|\${SA_TOKEN}|${SA_TOKEN}|g" \
                /template/index.html.template > /html/index.html
              echo "HTML genere: APP_MESSAGE=${APP_MESSAGE}"
              echo "Taille: $(wc -c < /html/index.html) bytes"
          env:
            - name: APP_MESSAGE
              valueFrom:
                configMapKeyRef:
                  name: nginx-config-2
                  key: APP_MESSAGE
            - name: USERNAME
              valueFrom:
                secretKeyRef:
                  name: nginx-secret-2
                  key: USERNAME
            - name: OPENSHIFT_API_URL
              value: "https://api.neutron-sno-gpu.neutron-it.fr:6443"
          volumeMounts:
            - name: template-volume
              mountPath: /template
            - name: html-volume
              mountPath: /html

      containers:
        - name: nginx-unprivileged-2
          image: nginxinc/nginx-unprivileged@sha256:731f382bbad9a874f9f27db9c82d9e671e603e2210386a8e2b6da36cf336fa75
          ports:
            - containerPort: 8080
          env:
            - name: APP_MESSAGE
              valueFrom:
                configMapKeyRef:
                  name: nginx-config-2
                  key: APP_MESSAGE
            - name: USERNAME
              valueFrom:
                secretKeyRef:
                  name: nginx-secret-2
                  key: USERNAME
            - name: PASSWORD
              valueFrom:
                secretKeyRef:
                  name: nginx-secret-2
                  key: PASSWORD
          volumeMounts:
            - name: html-volume
              mountPath: /usr/share/nginx/html
          resources:
            limits:
              cpu: 200m
              memory: 256Mi
            requests:
              cpu: 100m
              memory: 128Mi

      volumes:
        - name: template-volume
          configMap:
            name: nginx-dashboard-2
        - name: html-volume
          emptyDir: {}