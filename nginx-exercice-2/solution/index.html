<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <title>Neutron IT - Dashboard</title>
    <style>
        :root {
            --primary: #4f46e5;
            --danger: #e11d48;
            --bg: #f8fafc;
            --text-title: #0f172a;
            --text-muted: #64748b;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: var(--bg);
            color: #334155;
            line-height: 1.5;
        }

        .header {
            background: white;
            padding: 20px 50px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid #e2e8f0;
        }

        .brand {
            font-size: 1.25rem;
            font-weight: 800;
            color: var(--text-title);
            letter-spacing: -0.025em;
        }

        .nginx-pill {
            background: #dcfce7;
            color: #166534;
            font-size: 0.75rem;
            font-weight: 700;
            padding: 4px 12px;
            border-radius: 999px;
        }

        .container {
            max-width: 650px;
            margin: 40px auto;
            padding: 0 20px;
        }

        h1 {
            font-size: 1.8rem;
            color: var(--text-title);
            margin-bottom: 25px;
        }

        .card {
            background: white;
            border-radius: 16px;
            padding: 24px;
            margin-bottom: 24px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05), 0 2px 4px -1px rgba(0, 0, 0, 0.03);
            border: 1px solid #e2e8f0;
            transition: transform 0.2s;
        }

        .card:hover {
            transform: translateY(-2px);
        }

        .card-header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 20px;
            font-size: 0.75rem;
            font-weight: 700;
            color: var(--text-muted);
            text-transform: uppercase;
        }

        .badge {
            padding: 3px 8px;
            border-radius: 4px;
            color: white;
        }

        .bg-cm {
            background: var(--primary);
        }

        .bg-s {
            background: var(--danger);
        }

        .item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 0;
        }

        .key {
            font-family: 'Monaco', monospace;
            font-size: 0.85rem;
            font-weight: 600;
        }

        .val {
            font-size: 0.9rem;
            font-weight: 500;
            padding: 4px 10px;
            border-radius: 6px;
        }

        .card:not(.secret) .val {
            background: #eef2ff;
            color: var(--primary);
        }

        .card.secret .val {
            background: #fff1f2;
            color: var(--danger);
        }

        .footer {
            text-align: center;
            color: #94a3b8;
            font-size: 0.75rem;
            margin-top: 40px;
        }
    </style>
</head>

<body>

    <header class="header">
        <div class="brand">NEUTRON IT</div>
        <div class="nginx-pill">NGINX SERVED</div>
    </header>

    <div class="container">
        <h1>Dashboard Configuration</h1>

        <div class="card">
            <div class="card-header"><span class="badge bg-cm">CM</span> ConfigMap: nginx-config</div>
            <div class="item">
                <span class="key">APP_MESSAGE</span>
                <span class="val">Bienvenue dans NGINX</span>
            </div>
        </div>

        <div class="card secret">
            <div class="card-header"><span class="badge bg-s">S</span> Secret: nginx-secret</div>
            <div class="item">
                <span class="key">USERNAME</span>
                <span class="val">admin</span>
            </div>
            <div class="item">
                <span class="key">PASSWORD</span>
                <span class="val">••••••••</span>
            </div>
        </div>

        <footer class="footer">Neutron IT | OpenShift Lab 2026</footer>
    </div>
</body>

</html>
